[app:zope]
use = egg:Zope#main
zope_conf = %(here)s/zope.conf

[server:main]
use = egg:waitress#main
host = 0.0.0.0
port = 8080
threads = 4
max_request_body_size = 1073741824
clear_untrusted_proxy_headers = false

[filter:beaker]
use = egg:Products.Reportek#beaker_session

[filter:translogger]
use = egg:Paste#translogger
setup_console_handler = False

[pipeline:main]
pipeline =
    beaker
    translogger
    zope

[loggers]
keys = root, waitress.queue, waitress, wsgi

[handlers]
keys = console, accesslog

[formatters]
keys = generic, accesslog

[logger_root]
level = EVENT_LOG_LEVEL_MARKER
handlers = console

[logger_waitress.queue]
level = INFO
handlers =
qualname = waitress.queue

[logger_waitress]
level = INFO
handlers =
qualname = waitress

[logger_wsgi]
level = ACCESS_LOG_LEVEL_MARKER
handlers = accesslog
qualname = wsgi

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[handler_accesslog]
class = StreamHandler
args = (sys.stdout,)
level = INFO
formatter = accesslog

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s:%(lineno)s][%(threadName)s] %(message)s

[formatter_accesslog]
format = %(message)s
